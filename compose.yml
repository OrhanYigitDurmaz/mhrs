services:
  mariadb:
    image: mariadb:12.2.2-ubi10
    container_name: mhrs-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root123
      MARIADB_DATABASE: mhrs
      MARIADB_USER: mhrs_user
      MARIADB_PASSWORD: mhrs_pass
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-proot123",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./mhrs-backend
      dockerfile: Dockerfile
    container_name: mhrs-backend
    restart: unless-stopped
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: mhrs_user
      DB_PASSWORD: mhrs_pass
      DB_NAME: mhrs
    depends_on:
      mariadb:
        condition: service_healthy

  frontend:
    build:
      context: ./mhrs-frontend
      dockerfile: Dockerfile
    container_name: mhrs-frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: mhrs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mariadb_data:
